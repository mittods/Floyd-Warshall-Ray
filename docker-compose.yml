# Docker Compose para el entorno experimental Floyd-Warshall con Ray
#
# Uso rápido:
#   docker compose run --rm benchmark make benchmark      # CPU
#   docker compose run --rm benchmark make mostrar-escenarios
#   docker compose run --rm benchmark bash                # shell interactivo
#   docker compose run --rm analisis                      # generar tablas y gráficos
#
# GPU (requiere nvidia-container-toolkit en el host):
#   docker compose --profile gpu run --rm benchmark-gpu make benchmark
#
# Escalar experimentos (ejemplo Patagon):
#   FW_TAMANOS="1024,2048,4096,8192" FW_WORKERS="1,2,3" \
#     docker compose --profile gpu run --rm benchmark-gpu make benchmark

services:

  # ── Servicio CPU: experimentos sin GPU ────────────────────────────────────
  benchmark:
    image: ghcr.io/mittods/floyd-warshall-ray:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fw_benchmark

    environment:
      FW_TAMANOS: "${FW_TAMANOS:-256,512,1024,2048}"
      FW_WORKERS: "${FW_WORKERS:-1,2,4,8,16,32}"
      FW_REPETICIONES: "${FW_REPETICIONES:-5}"
      FW_SEMILLA: "${FW_SEMILLA:-42}"
      FW_DENSIDAD: "${FW_DENSIDAD:-0.7}"
      FW_INTERVALO_MONITOR: "${FW_INTERVALO_MONITOR:-0.5}"
      RAY_NUM_CPUS: "${RAY_NUM_CPUS:-}"
      RAY_OBJECT_STORE_MEMORY: "${RAY_OBJECT_STORE_MEMORY:-}"
      CUPY_CACHE_DIR: "/tmp/cupy_cache"
      DOCKER_IMAGE_TAG: "${DOCKER_IMAGE_TAG:-latest}"

    volumes:
      - ./resultados:/app/resultados
      - ./graficos:/app/graficos
      - ./metricas:/app/metricas
      - ./src:/app/src:ro
      - ./experimentos:/app/experimentos:ro
      - ./analisis:/app/analisis:ro

    ipc: host
    network_mode: host
    stdin_open: true
    tty: true
    command: bash

  # ── Servicio GPU: experimentos con NVIDIA GPU ─────────────────────────────
  # Requiere nvidia-container-toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  # Activar con: docker compose --profile gpu run --rm benchmark-gpu <cmd>
  benchmark-gpu:
    extends:
      service: benchmark
    container_name: fw_benchmark_gpu
    profiles: ["gpu"]

    environment:
      FW_TAMANOS: "${FW_TAMANOS:-1024,2048,4096}"
      FW_WORKERS: "${FW_WORKERS:-1,2,4}"
      FW_REPETICIONES: "${FW_REPETICIONES:-5}"
      FW_SEMILLA: "${FW_SEMILLA:-42}"
      FW_DENSIDAD: "${FW_DENSIDAD:-0.7}"
      FW_INTERVALO_MONITOR: "${FW_INTERVALO_MONITOR:-0.1}"
      RAY_NUM_CPUS: "${RAY_NUM_CPUS:-}"
      RAY_OBJECT_STORE_MEMORY: "${RAY_OBJECT_STORE_MEMORY:-}"
      CUPY_CACHE_DIR: "/tmp/cupy_cache"
      DOCKER_IMAGE_TAG: "${DOCKER_IMAGE_TAG:-latest}"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Servicio de análisis post-benchmark ──────────────────────────────────
  analisis:
    image: ghcr.io/mittods/floyd-warshall-ray:latest
    container_name: fw_analisis

    environment:
      FW_TAMANOS: "${FW_TAMANOS:-256,512,1024,2048}"
      FW_WORKERS: "${FW_WORKERS:-1,2,4,8,16,32}"

    volumes:
      - ./resultados:/app/resultados
      - ./graficos:/app/graficos
      - ./src:/app/src:ro
      - ./analisis:/app/analisis:ro
      - ./experimentos:/app/experimentos:ro

    command: >
      bash -c "
        python -m analisis.generar_tablas &&
        python -m analisis.generar_graficos &&
        echo 'Análisis completado. Resultados en ./resultados/ y ./graficos/'
      "
